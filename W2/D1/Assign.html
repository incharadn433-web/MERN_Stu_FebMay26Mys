<!DOCTYPE html>
<html>
<head>
<title>Tasks Demo</title>
<style>


.navbar {
  position: sticky;
  top: 0;
  background-color:pink;
  padding: 10px;
  z-index: 1000;
  color:blue;
}

.navbar a {
  color: blue;
  margin: 10px;
  text-decoration: none;
  transition: 0.3s;   
}

.navbar a:hover {
  color: yellow;
}

.box1, .box2 {
  width: 120px;
  height: 120px;
  position: absolute;
}

.box1 {
  background: blue;
  top: 120px;
  left: 40px;
  z-index: 1;
}

.box2 {
  background:red;
  top: 160px;
  left: 80px;
  z-index: 2;
}




.ball {
  width: 50px;
  height: 50px;
  background-color: orange;
  border-radius: 50%;
  position: relative;
  animation: bounce 1s infinite alternate;
  animation-timing-function: 50s;
}

@keyframes bounce {
  from { top: 0; }
  to { top: 200px; }
}

.home {
  width: 200px;
  height: 200px;
  background-color:green ;
  margin: 50px auto;
  position: relative;
  border: 3px solid black;
}

.box5{
  width: 240px;
  height: 30px;
  background: orange;
  position: absolute;
  top: -30px;
  left: -20px;
  border: 3px solid black;
}

.door {
  width: 50px;
  height: 90px;
  background: blue;
  position: absolute;
  bottom: 0;
  left: 75px;
  border: 3px solid black;
}

.wind1 {
  width: 40px;
  height: 60px;
  background: yellow;
  position: absolute;
  top: 40px;
  left: 20px;
  border: 3px solid black;
}

.wind2 {
  width: 40px;
  height: 60px;
  background: purple;
  position: absolute;
  top: 40px;
  right: 20px;
  border: 3px solid black;
}

</style>
</head>

<body>

<div class="navbar">
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</div>


<div class="box1"></div>
<div class="box2"></div>





<div class="ball"></div>


<div class="home">
  <div class="box5"></div>
  <div class="door"></div>
  <div class="wind1"></div>
  <div class="wind2"></div>
</div>

</body>
</html>
