<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metric Snapshot Strip</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="w-200 item-center bg-white-800 shadow m-10">
     <div class="inline-flex gap-10 m-5">
      <div>
       <h6 class="text-black text-light">Active users</h6>
       <h5 class="font-bold">12,480</h5>
       <span class="bg-green-300 rounded-full">Up</span>
      </div >
        <div>
       <h6 class="text-black text-light">Requests/Min</h6>
       <h5 class="font-bold">1,240</h5>
       <span class="bg-blue-300 rounded-full">stable</span>
       </div>
       <div>
       <h6 class="text-black text-light">Error Rate</h6>
       <h5 class="font-bold">2.1%</h5>
       <span class="bg-red-300 rounded-full">down</span>
       </div>
        <div>
            <button class="bg-blue-200 text-sm text-white px-6 py-3 p-1 rounded-full shadow ">Download Report</button>
        </div>
      </div>
       <div class="m-5">
       <p class="bg-red-200 border-l-4 border-red-500 p-2 ">Scheduled maintance tonight may briefly affect dashboard update </p>
       </div>
       </div>
       
</body>
</html>
