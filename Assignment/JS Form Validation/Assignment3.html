<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Section feedback Analyzer</title>
</head>
<body>
    <h2>Feedback Form</h2>
    <p>Total Feedback: <strong id="count">0</strong></p>

    <form>
        <input type="text" id="name" placeholder="Enter Name">
        <p id="nameErr"></p>

        <input type="email" id="email" placeholder="Enter Email">
        <p id="emailErr"></p>

        <select id="type">
            <option value="Bug">Bug</option>
            <option value="Suggestion">Suggestion</option>
            <option value="Appreciation">Appreciation</option>
        </select><br><br>

        <textarea id="text" placeholder="Feedback (min 20 chars)"></textarea>
        <p id="textErr"></p>

        <button id="add">Submit Feedback</button>
    </form>

    <div id="display"></div>
    <p id="empty"></p>

    <script src="./JSFormValidationAssign3.js"></script>
</body>
</html>
