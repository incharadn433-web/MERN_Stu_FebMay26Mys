!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>justify-content</title>
<style>
.flex-container {
display: flex;
justify-content: space-around; /* try: flex-start, flex-end, center, space-between, space-evenly */
background-color: #ddd;
padding: 10px;
}
.flex-item {
background-color: steelblue;
color: white;
padding: 20px;
width: 100px;
text-align: center;
}
</style>
</head>
<body>
<h1>justify-content</h1>
<div class="flex-container">
<div class="flex-item">One</div>
<div class="flex-item">Two</div>
<div class="flex-item">Three</div>
</div>
</body>
</html>
