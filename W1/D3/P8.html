<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Selector and Grouping selector</title>
    <style>
        /* Universal Selector */
        *{
            margin: 0;
            padding: 0;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        /* Grouping selector */
        h1,h3{
            color: blueviolet;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h2>All elements have zero margin and zero padding</h2>
    <p>Universal paragraph</p>
    <h1>Main Heading</h1>
    <h3>Sub Heading</h3>
</body>
</html>
